name: web-research-mcp
description: AI-powered web research MCP server for agents. Supports web search, browse
  page, extract article. By MEOK AI Labs.
version: 1.0.0
tools:
- name: web_search
  description: Search the web using DuckDuckGo. Returns titles, URLs, and snippets
  parameters:
  - name: query
    type: string
    required: true
  - name: limit
    type: integer
    required: false
- name: browse_page
  description: Browse a webpage using a headless Chromium browser (Playwright).
  parameters:
  - name: url
    type: string
    required: true
  - name: action
    type: string
    required: false
  - name: instruction
    type: string
    required: false
- name: extract_article
  description: Extract clean, readable article text from a URL. Strips navigation,
  parameters:
  - name: url
    type: string
    required: true
- name: research_topic
  description: 'Multi-step research workflow: search the web, then extract content
    from'
  parameters:
  - name: query
    type: string
    required: true
  - name: depth
    type: integer
    required: false
- name: get_weather
  description: Get current weather for a location using wttr.in (no API key needed).
  parameters:
  - name: location
    type: string
    required: false
- name: deep_research
  description: Autonomous multi-step research. Searches, reads pages, synthesizes
    findings.
  parameters:
  - name: topic
    type: string
    required: true
  - name: depth
    type: integer
    required: false
- name: autonomous_research
  description: Run an autonomous multi-step research loop on a topic.
  parameters:
  - name: topic
    type: string
    required: true
  - name: depth
    type: integer
    required: false
